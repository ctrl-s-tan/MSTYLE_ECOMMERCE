<!-- Rider-Buyer Chat Modal -->
<div id="riderBuyerChatModal" class="rider-buyer-chat-modal" style="display: none;">
    <div class="rider-buyer-chat-container">
        <div class="rider-buyer-chat-header">
            <div class="chat-header-info">
                <div class="rider-avatar-chat">B</div>
                <div class="rider-details-chat">
                    <h2 id="chatBuyerName">Chat with Buyer</h2>
                    <p class="online-status-chat"><i class="bi bi-circle-fill"></i> Online</p>
                </div>
            </div>
            <button class="close-rider-buyer-chat" onclick="closeRiderBuyerChatModal()" type="button" aria-label="Close chat">
                <i class="bi bi-x"></i>
            </button>
        </div>
        <div class="rider-buyer-chat-body">
            <!-- Order Context Info -->
            <div class="order-context-info" id="buyerOrderContextInfo" style="display: none;">
                <div class="context-header">
                    <i class="bi bi-box-seam"></i>
                </div>
                <div class="context-details">
                    <div class="context-item">
                        <span class="context-label">Order ID:</span>
                        <span class="context-value" id="buyerContextOrderId"></span>
                    </div>
                    <div class="context-item">
                        <span class="context-label">Product:</span>
                        <span class="context-value" id="buyerContextProductName"></span>
                    </div>
                </div>
            </div>

            <!-- Messages Area -->
            <div class="messages-area" id="riderBuyerMessagesArea">
                <div class="chat-placeholder">
                    <i class="bi bi-chat-text"></i>
                    <h3>No conversation selected</h3>
                    <p>Click "Contact Buyer" from an order to start chatting</p>
                </div>
            </div>
        </div>

        <!-- Message Input Footer -->
        <div class="chat-modal-footer" id="riderBuyerMessageInput" style="display: none;">
            <textarea 
                id="riderBuyerMessageText" 
                placeholder="Type your message..." 
                rows="1"
                maxlength="1000"></textarea>
            <button class="send-message-btn" onclick="sendRiderBuyerMessage()">
                <i class="bi bi-send-fill"></i>
            </button>
            <span class="char-count"><span id="buyerCharCount">0</span>/1000</span>
        </div>
    </div>
</div>
