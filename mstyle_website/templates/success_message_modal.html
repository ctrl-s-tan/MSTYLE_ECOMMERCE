<!-- Success Message Modal -->
<div id="successModal" class="success-modal" aria-hidden="true" role="dialog" aria-labelledby="success-modal-title">
    <div class="success-modal-content">
        <div class="success-icon">
            <i class="fas fa-check success-checkmark" aria-hidden="true"></i>
        </div>
        <h2 id="success-modal-title">Order Placed Successfully!</h2>
        <p class="thank-you-message">Thank You for Your Purchase!</p>
        <p class="order-message">
            Your order has been confirmed and is being processed. 
            You will receive a confirmation email shortly with your order details.
        </p>
        <div class="success-modal-buttons">
            <button type="button" class="view-orders-btn" onclick="goToOrders()">
                <i class="fas fa-box" aria-hidden="true"></i>
                View My Orders
            </button>
            <button type="button" class="continue-shopping-btn" onclick="continueShopping()">
                <i class="fas fa-shopping-bag" aria-hidden="true"></i>
                Continue Shopping
            </button>
        </div>
    </div>
</div>
