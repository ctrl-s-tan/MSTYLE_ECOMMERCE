<!-- Messages Modal -->
<div id="messagesModal" class="messages-modal" style="display: none;">
    <div class="messages-modal-container">
        <div class="messages-modal-header">
            <h2><i class="bi bi-chat-dots"></i> Messages</h2>
            <button class="close-messages-modal" onclick="closeMessagesModal()">
                <i class="bi bi-x"></i>
            </button>
        </div>
        <div class="messages-modal-body">
            <!-- Conversations Sidebar -->
            <div class="conversations-sidebar-modal">
                <div class="conversations-list-modal" id="conversationsListModal">
                    <div class="loading-conversations">
                        <i class="bi bi-hourglass-split"></i>
                        <p>Loading conversations...</p>
                    </div>
                </div>
            </div>
            <!-- Chat Area -->
            <div class="chat-area-modal" id="chatAreaModal">
                <div class="chat-placeholder-modal">
                    <i class="bi bi-chat-text"></i>
                    <h3>Select a conversation</h3>
                    <p>Choose a conversation from the left to start messaging</p>
                </div>
            </div>
        </div>
    </div>
</div>
