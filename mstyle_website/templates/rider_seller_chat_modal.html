<!-- Rider-Seller Chat Modal -->
<div id="riderSellerChatModal" class="rider-seller-chat-modal" style="display: none;">
    <div class="rider-seller-chat-container">
        <div class="rider-seller-chat-header">
            <div class="chat-header-info">
                <div class="rider-avatar-chat">S</div>
                <div class="rider-details-chat">
                    <h2 id="chatSellerName">Chat with Seller</h2>
                    <p class="online-status-chat"><i class="bi bi-circle-fill"></i> Online</p>
                </div>
            </div>
            <button class="close-rider-seller-chat" onclick="closeRiderSellerChatModal()" type="button" aria-label="Close chat">
                <i class="bi bi-x"></i>
            </button>
        </div>
        <div class="rider-seller-chat-body">
            <!-- Order Context Info -->
            <div class="order-context-info" id="sellerOrderContextInfo" style="display: none;">
                <div class="context-header">
                    <i class="bi bi-box-seam"></i>
                </div>
                <div class="context-details">
                    <div class="context-item">
                        <span class="context-label">Order ID:</span>
                        <span class="context-value" id="sellerContextOrderId"></span>
                    </div>
                    <div class="context-item">
                        <span class="context-label">Product:</span>
                        <span class="context-value" id="sellerContextProductName"></span>
                    </div>
                </div>
            </div>

            <!-- Messages Area -->
            <div class="messages-area" id="riderSellerMessagesArea">
                <div class="chat-placeholder">
                    <i class="bi bi-chat-text"></i>
                    <h3>No conversation selected</h3>
                    <p>Click "Contact Seller" from an order to start chatting</p>
                </div>
            </div>
        </div>

        <!-- Message Input Footer -->
        <div class="chat-modal-footer" id="riderSellerMessageInput" style="display: none;">
            <textarea 
                id="riderSellerMessageText" 
                placeholder="Type your message..." 
                rows="1"
                maxlength="1000"></textarea>
            <button class="send-message-btn" onclick="sendRiderSellerMessage()">
                <i class="bi bi-send-fill"></i>
            </button>
            <span class="char-count"><span id="sellerCharCount">0</span>/1000</span>
        </div>
    </div>
</div>
