<!-- Buyer-Seller Chat Modal for Orders -->
<div id="buyerSellerChatOrderModal" class="buyer-rider-chat-modal" aria-hidden="true" role="dialog">
    <div class="rider-chat-modal-container">
        <!-- Chat Header -->
        <div class="rider-chat-modal-header">
            <div class="rider-chat-header-info">
                <div class="rider-avatar-chat">
                    <img id="sellerProfilePicOrder" class="rider-avatar-chat-img" src="" alt="Seller" style="display: none;">
                    <div class="rider-avatar-chat-icon" id="sellerAvatarIconOrder">
                        <i class="bi bi-shop"></i>
                    </div>
                </div>
                <div class="rider-details-chat">
                    <h3 id="sellerNameOrder">Seller</h3>
                    <div class="online-status-chat">
                        <i class="bi bi-circle-fill"></i>
                        <span>Online</span>
                    </div>
                </div>
            </div>
            <button class="close-rider-chat-modal" onclick="closeSellerChatOrder()" aria-label="Close chat">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <!-- Chat Body -->
        <div class="rider-chat-modal-body">
            <!-- Order Context -->
            <div class="rider-chat-order-context">
                <div class="order-context-icon">
                    <i class="bi bi-bag-check"></i>
                </div>
                <div class="order-context-info">
                    <div class="order-context-label">Order ID</div>
                    <div class="order-context-id" id="orderIdContextSeller">#0000</div>
                </div>
            </div>

            <!-- Messages Area -->
            <div class="rider-chat-messages-area" id="sellerMessagesAreaOrder">
                <!-- Loading State -->
                <div class="chat-loading" id="sellerChatLoadingOrder">
                    <i class="bi bi-hourglass-split"></i>
                    <p>Loading messages...</p>
                </div>

                <!-- Empty State -->
                <div class="rider-chat-empty-state" id="sellerChatEmptyOrder" style="display: none;">
                    <i class="bi bi-chat-dots"></i>
                    <h4>Start a conversation</h4>
                    <p>Send a message to the seller about your order</p>
                </div>

                <!-- Messages will be dynamically inserted here -->
            </div>
        </div>

        <!-- Chat Footer -->
        <div class="rider-chat-modal-footer">
            <div class="rider-chat-input-wrapper">
                <textarea 
                    id="sellerMessageInputOrder" 
                    placeholder="Type your message about this order..."
                    rows="1"
                    maxlength="1000"
                    onkeydown="handleSellerOrderKeyPress(event)"
                    oninput="autoResizeSellerOrderTextarea(this); updateSellerOrderCharCount()"></textarea>
                <button class="send-rider-message-btn" onclick="sendSellerMessageOrder()" id="sendSellerBtnOrder">
                    <i class="bi bi-send-fill"></i>
                </button>
            </div>
            <div class="rider-message-info">
                <span class="rider-char-count" id="sellerCharCountOrder">0/1000</span>
            </div>
        </div>
    </div>
</div>
