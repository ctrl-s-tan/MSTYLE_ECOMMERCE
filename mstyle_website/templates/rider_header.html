<header>
    <div class="top-header">
        <div class="logo-container">
            <a href="/homepage">
                <img src="{{ url_for('static', filename='images/MStyle Logos/MStyle_logo1.png') }}" alt="Fastique"
                    class="brand-logo">
                <span class="brand-text">Style</span>
            </a>
        </div>

        <nav class="nav-menu">
            <!-- Navigation moved to right-controls -->
        </nav>

        <div class="right-controls">
            <!-- Messages Dropdown -->
            <div class="messages-dropdown" id="messagesDropdown">
                <button class="dropdown-btn messages-btn" onclick="toggleMessagesDropdown(event)">
                    <i class="bi bi-chat-dots"></i>
                    <span class="message-badge" id="messageBadge">0</span>
                </button>
                <div class="dropdown-content messages-content">
                    <div class="dropdown-header">
                        <h4>Messages</h4>
                        <div class="header-actions">
                            <button class="delete-all-btn" onclick="deleteRiderAllConversations()"
                                title="Delete all conversations">
                                <i class="bi bi-trash"></i>
                                Delete all
                            </button>
                        </div>
                    </div>
                    <div class="messages-list" id="messagesList">
                        <div class="no-messages">
                            <i class="bi bi-chat-slash"></i>
                            <p>No new messages</p>
                        </div>
                    </div>
                    <div class="dropdown-footer">
                        <a href="#" onclick="openMessagesModal(event)" class="view-all-link">
                            <i class="bi bi-envelope"></i>
                            View all conversations
                        </a>
                    </div>
                </div>
            </div>

            <!-- Notifications Dropdown -->
            <div class="notifications-dropdown" id="notificationsDropdown">
                <button class="dropdown-btn notifications-btn" onclick="toggleNotificationsDropdown(event)">
                    <i class="bi bi-bell"></i>
                    <span class="notification-badge" id="notificationBadge">0</span>
                </button>
                <div class="dropdown-content notifications-content">
                    <div class="dropdown-header">
                        <h4>Delivery Notifications</h4>
                        <div class="header-actions">
                            <button class="mark-all-read" onclick="markAllAsRead()" title="Mark all as read">
                                <i class="bi bi-check2-all"></i>
                                Mark as read
                            </button>
                            <button class="delete-all-btn" onclick="deleteAllNotifications()"
                                title="Delete all notifications">
                                <i class="bi bi-trash"></i>
                                Delete all
                            </button>
                        </div>
                    </div>
                    <div class="notifications-list" id="notificationsList">
                        <div class="no-notifications">
                            <i class="bi bi-bell-slash"></i>
                            <p>No new notifications</p>
                        </div>
                    </div>
                    <div class="dropdown-footer">
                        <a href="{{ url_for('available_deliveries') }}" class="view-all-link">
                            <i class="bi bi-truck"></i>
                            View all deliveries
                        </a>
                    </div>
                </div>
            </div>

            <!-- Profile Dropdown -->
            <div class="profile-dropdown" id="profileDropdown">
                <button class="dropdown-btn" onclick="toggleProfileDropdown(event)">
                    <i class="bi bi-person-circle"></i>
                    <span id="user-name">{{ user_email or 'Rider' }}</span>
                    <i class="bi bi-chevron-down dropdown-arrow"></i>
                </button>
                <div class="dropdown-content">
                    <a href="{{ url_for('profile') }}">
                        <i class="bi bi-person"></i>
                        <span>My Profile</span>
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="{{ url_for('rider_dashboard') }}"
                        class="{% if request.endpoint=='rider_dashboard' %}active{% endif %}">
                        <i class="bi bi-speedometer2"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="{{ url_for('available_deliveries') }}"
                        class="{% if request.endpoint=='available_deliveries' %}active{% endif %}">
                        <i class="bi bi-list-task"></i>
                        <span>Available Deliveries</span>
                    </a>
                    <a href="{{ url_for('active_deliveries') }}"
                        class="rider-active-link {% if request.endpoint=='active_deliveries' %}active{% endif %}">
                        <i class="bi bi-truck"></i>
                        <span>Active Deliveries</span>
                    </a>
                    <a href="{{ url_for('delivery_history') }}"
                        class="rider-history-link {% if request.endpoint=='delivery_history' %}active{% endif %}">
                        <i class="bi bi-clock-history"></i>
                        <span>Delivery History</span>
                    </a>
                     <a href="{{ url_for('earnings') }}"
                        class="rider-earnings-link {% if request.endpoint=='earnings' %}active{% endif %}">
                        <i class="bi bi-currency-dollar"></i>
                        <span>Earnings</span>
                    </a>
                    <div class="dropdown-divider"></div>
                    <a href="#" onclick="confirmLogout()">
                        <i class="bi bi-box-arrow-right"></i>
                        <span>Logout</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>

<script>
    function toggleProfileDropdown(event) {
        event.stopPropagation();
        const dropdown = document.getElementById('profileDropdown');
        const notificationsDropdown = document.getElementById('notificationsDropdown');
        const messagesDropdown = document.getElementById('messagesDropdown');

        // Close other dropdowns if open
        notificationsDropdown.classList.remove('active');
        messagesDropdown.classList.remove('active');

        dropdown.classList.toggle('active');
    }

    function toggleMessagesDropdown(event) {
        event.stopPropagation();
        const dropdown = document.getElementById('messagesDropdown');
        const notificationsDropdown = document.getElementById('notificationsDropdown');
        const profileDropdown = document.getElementById('profileDropdown');

        // Close other dropdowns if open
        notificationsDropdown.classList.remove('active');
        profileDropdown.classList.remove('active');

        dropdown.classList.toggle('active');

        // Load messages when opened
        if (dropdown.classList.contains('active')) {
            loadRiderMessages();
        }
    }

    function toggleNotificationsDropdown(event) {
        event.stopPropagation();
        const dropdown = document.getElementById('notificationsDropdown');
        const messagesDropdown = document.getElementById('messagesDropdown');
        const profileDropdown = document.getElementById('profileDropdown');

        // Close other dropdowns if open
        messagesDropdown.classList.remove('active');
        profileDropdown.classList.remove('active');

        dropdown.classList.toggle('active');

        // Load notifications when opened
        if (dropdown.classList.contains('active')) {
            loadRiderNotifications();
        }
    }

    function loadRiderNotifications() {
        console.log('🚚 Loading rider notifications...');
        
        fetch('/api/rider-notifications')
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    updateNotificationBadge(data.unread_count);
                    displayNotifications(data.notifications);
                } else {
                    console.error('Failed to load notifications:', data.message);
                }
            })
            .catch(error => {
                console.error('Error loading notifications:', error);
            });
    }

    function updateNotificationBadge(count) {
        const badge = document.getElementById('notificationBadge');
        if (count > 0) {
            badge.textContent = count > 99 ? '99+' : count;
            badge.style.display = 'flex';
        } else {
            badge.style.display = 'none';
        }
    }

    function displayNotifications(notifications) {
        const notificationsList = document.getElementById('notificationsList');
        
        if (!notifications || notifications.length === 0) {
            notificationsList.innerHTML = `
                <div class="no-notifications">
                    <i class="bi bi-bell-slash"></i>
                    <p>No new notifications</p>
                </div>
            `;
            return;
        }
        
        notificationsList.innerHTML = notifications.map(notif => `
            <div class="notification-item ${notif.is_read ? 'read' : 'unread'}" data-id="${notif.id}">
                <div class="notification-icon">
                    <i class="bi bi-truck"></i>
                </div>
                <div class="notification-content">
                    <p class="notification-message">${notif.message}</p>
                    <span class="notification-time">${formatNotificationTime(notif.created_at)}</span>
                </div>
                <div class="notification-actions">
                    ${notif.order_id ? `<a href="/available_deliveries" class="view-order-btn" title="View delivery"><i class="bi bi-eye"></i></a>` : ''}
                    ${!notif.is_read ? `<button class="mark-read-btn" onclick="markNotificationAsRead(${notif.id}, event)" title="Mark as read"><i class="bi bi-check"></i></button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function formatNotificationTime(timestamp) {
        if (!timestamp) return '';
        
        const date = new Date(timestamp);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);
        
        if (diffMins < 1) return 'Just now';
        if (diffMins < 60) return `${diffMins} min${diffMins > 1 ? 's' : ''} ago`;
        if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
        if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
        
        return date.toLocaleDateString();
    }

    function markNotificationAsRead(notificationId, event) {
        event.stopPropagation();
        
        fetch(`/api/rider-notifications/mark-read/${notificationId}`, {
            method: 'POST'
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                loadRiderNotifications();
            }
        })
        .catch(error => {
            console.error('Error marking notification as read:', error);
        });
    }

    function markAllAsRead() {
        fetch('/api/rider-notifications/mark-all-read', {
            method: 'POST'
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                loadRiderNotifications();
            }
        })
        .catch(error => {
            console.error('Error marking all as read:', error);
        });
    }

    function deleteAllNotifications() {
        if (!confirm('Are you sure you want to delete all notifications?')) {
            return;
        }
        
        fetch('/api/rider-notifications/delete-all', {
            method: 'DELETE'
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                loadRiderNotifications();
            }
        })
        .catch(error => {
            console.error('Error deleting notifications:', error);
        });
    }

    // Load rider messages
    function loadRiderMessages() {
        console.log('💬 Loading rider messages...');
        fetch('/api/rider/messages')
            .then(response => {
                console.log('📡 Messages response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('📋 Messages data received:', data);
                const messagesList = document.getElementById('messagesList');
                const messageBadge = document.getElementById('messageBadge');

                if (data.success && data.conversations && data.conversations.length > 0) {
                    console.log(`✅ Found ${data.conversations.length} conversations`);

                    // Update badge count (unread messages)
                    const unreadCount = data.conversations.reduce((sum, conv) => sum + (conv.unread_count || 0), 0);
                    console.log(`🔢 Unread messages count: ${unreadCount}`);

                    messageBadge.textContent = unreadCount;
                    messageBadge.style.display = unreadCount > 0 ? 'block' : 'none';

                    // Populate messages
                    messagesList.innerHTML = '';
                    data.conversations.forEach((conversation, index) => {
                        console.log(`📝 Processing conversation ${index + 1}:`, conversation);
                        const messageItem = createRiderMessageItem(conversation);
                        messagesList.appendChild(messageItem);
                    });

                    console.log('✅ Messages displayed successfully');
                } else {
                    console.log('ℹ️ No messages found or API error');
                    if (!data.success) {
                        console.error('❌ API Error:', data.error);
                    }

                    // No messages
                    messageBadge.textContent = '0';
                    messageBadge.style.display = 'none';
                    messagesList.innerHTML = `
                        <div class="no-messages">
                            <i class="bi bi-chat-slash"></i>
                            <p>No new messages</p>
                        </div>
                    `;
                }
            })
            .catch(error => {
                console.error('❌ Error loading messages:', error);
                const messagesList = document.getElementById('messagesList');
                if (messagesList) {
                    messagesList.innerHTML = `
                        <div class="no-messages">
                            <i class="bi bi-exclamation-triangle"></i>
                            <p>Error loading messages</p>
                        </div>
                    `;
                }
            });
    }

    function createRiderMessageItem(conversation) {
        console.log('🎨 Creating rider message item:', conversation);

        const item = document.createElement('div');
        item.className = `message-item ${conversation.unread_count > 0 ? 'unread' : ''}`;

        const formattedTime = formatNotificationTime(conversation.last_message_at);
        const contactName = conversation.contact_name || (conversation.conversation_type === 'seller' ? 'Seller' : 'Buyer');
        const orderInfo = conversation.order_id ? `Order #${conversation.order_id}` : 'General Inquiry';
        const lastMessage = conversation.last_message || 'No messages yet';
        
        // Different icon for seller vs buyer
        const avatarIcon = conversation.conversation_type === 'seller' ? 'bi-shop' : 'bi-person-circle';
        const conversationType = conversation.conversation_type === 'seller' ? 'Seller' : 'Buyer';

        item.innerHTML = `
            <div class="message-avatar">
                <i class="bi ${avatarIcon}"></i>
            </div>
            <div class="message-content">
                <div class="message-header">
                    <span class="buyer-name">${contactName} <small style="color: #999;">(${conversationType})</small></span>
                    <span class="message-time">${formattedTime}</span>
                </div>
                <div class="product-context">${orderInfo}</div>
                <div class="message-preview">${lastMessage}</div>
            </div>
            <div class="message-actions">
                <button class="delete-message-btn" onclick="deleteRiderConversation('${conversation.conversation_id}', event)" title="Delete conversation">
                    <i class="bi bi-x"></i>
                </button>
            </div>
            ${conversation.unread_count > 0 ? `<div class="unread-indicator"></div>` : ''}
        `;

        // Open conversation when clicked (but not when clicking delete button)
        item.addEventListener('click', (event) => {
            // Don't open if clicking on delete button
            if (!event.target.closest('.delete-message-btn')) {
                console.log('🖱️ Message clicked:', conversation);
                openRiderChatFromHeader(conversation);
            }
        });

        return item;
    }

    function deleteRiderConversation(conversationId, event) {
        // Prevent the message click event from firing
        event.stopPropagation();

        console.log(`🗑️ Deleting rider conversation: ${conversationId}`);

        if (!confirm('Are you sure you want to delete this conversation? This will delete all messages in this conversation.')) {
            return;
        }

        // Add visual feedback
        const messageItem = event.target.closest('.message-item');
        if (messageItem) {
            messageItem.style.opacity = '0.5';
            messageItem.style.pointerEvents = 'none';
        }

        fetch('/api/rider/conversations/delete', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ conversation_id: conversationId })
        })
            .then(response => {
                console.log('Delete conversation response status:', response.status);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('Delete conversation response data:', data);
                if (data.success) {
                    console.log(`✅ Conversation ${conversationId} deleted successfully`);
                    loadRiderMessages(); // Refresh messages
                } else {
                    console.error('Failed to delete conversation:', data.error);
                    alert(`Failed to delete conversation: ${data.error}`);

                    // Restore visual state on error
                    if (messageItem) {
                        messageItem.style.opacity = '1';
                        messageItem.style.pointerEvents = 'auto';
                    }
                }
            })
            .catch(error => {
                console.error('Error deleting conversation:', error);
                alert(`Error deleting conversation: ${error.message}`);
                // Restore visual state on error
                if (messageItem) {
                    messageItem.style.opacity = '1';
                    messageItem.style.pointerEvents = 'auto';
                }
            });
    }

    function deleteRiderAllConversations() {
        // Show confirmation dialog
        if (!confirm('Are you sure you want to delete all conversations? This action cannot be undone.')) {
            return;
        }

        console.log('🗑️ Deleting all rider conversations...');

        // Get the button element for visual feedback
        const deleteAllBtn = document.querySelector('.messages-dropdown .delete-all-btn');
        const originalHTML = deleteAllBtn ? deleteAllBtn.innerHTML : '';
        
        // Show loading state
        if (deleteAllBtn) {
            deleteAllBtn.disabled = true;
            deleteAllBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Deleting...';
            deleteAllBtn.style.opacity = '0.6';
        }

        fetch('/api/rider/conversations/delete-all', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
            .then(response => {
                console.log('Delete all conversations response status:', response.status);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('Delete all conversations response data:', data);
                if (data.success) {
                    console.log(`✅ ${data.deleted_count || 'All'} conversations deleted successfully`);
                    
                    // Show success state briefly
                    if (deleteAllBtn) {
                        deleteAllBtn.innerHTML = '<i class="bi bi-check-circle"></i> Done!';
                        setTimeout(() => {
                            deleteAllBtn.innerHTML = originalHTML;
                            deleteAllBtn.disabled = false;
                            deleteAllBtn.style.opacity = '1';
                        }, 1500);
                    }
                    
                    loadRiderMessages(); // Refresh messages
                    alert(`Successfully deleted ${data.deleted_count || 'all'} conversations`);
                } else {
                    console.error('Failed to delete all conversations:', data.error);
                    alert(`Failed to delete all conversations: ${data.error}`);
                    
                    // Restore button state
                    if (deleteAllBtn) {
                        deleteAllBtn.innerHTML = originalHTML;
                        deleteAllBtn.disabled = false;
                        deleteAllBtn.style.opacity = '1';
                    }
                }
            })
            .catch(error => {
                console.error('Error deleting all conversations:', error);
                alert(`Error deleting all conversations: ${error.message}`);
                
                // Restore button state
                if (deleteAllBtn) {
                    deleteAllBtn.innerHTML = originalHTML;
                    deleteAllBtn.disabled = false;
                    deleteAllBtn.style.opacity = '1';
                }
            });
    }

    function openRiderChatFromHeader(conversation) {
        console.log('💬 Opening rider chat from header:', conversation);
        // This will be handled by the messages modal
        openMessagesModal(null, conversation);
    }

    function openMessagesModal(event, conversation = null) {
        if (event) {
            event.preventDefault();
        }
        
        console.log('📬 Opening messages modal for rider');
        
        // Close the dropdown
        const messagesDropdown = document.getElementById('messagesDropdown');
        if (messagesDropdown) {
            messagesDropdown.classList.remove('active');
        }
        
        // Show the modal
        const modal = document.getElementById('messagesModal');
        if (modal) {
            modal.style.display = 'flex';
            
            // Load conversations in modal - the function from messages_modal.js will auto-detect user type
            if (typeof loadAllConversations === 'function') {
                loadAllConversations(conversation ? conversation.conversation_id : null);
            }
            
            // If a specific conversation was passed, open it
            if (conversation && typeof loadModalConversation === 'function') {
                setTimeout(() => {
                    loadModalConversation(conversation);
                }, 500);
            }
        }
    }

    function closeMessagesModal() {
        const modal = document.getElementById('messagesModal');
        if (modal) {
            modal.style.display = 'none';
        }
    }

    // Load notifications and messages on page load
    document.addEventListener('DOMContentLoaded', function() {
        loadRiderNotifications();
        loadRiderMessages();
        
        // Refresh notifications and messages every 30 seconds
        setInterval(loadRiderNotifications, 30000);
        setInterval(loadRiderMessages, 30000);
    });

    // Close dropdowns when clicking outside
    document.addEventListener('click', function (event) {
        const profileDropdown = document.getElementById('profileDropdown');
        const notificationsDropdown = document.getElementById('notificationsDropdown');
        const messagesDropdown = document.getElementById('messagesDropdown');

        if (profileDropdown && !profileDropdown.contains(event.target)) {
            profileDropdown.classList.remove('active');
        }

        if (notificationsDropdown && !notificationsDropdown.contains(event.target)) {
            notificationsDropdown.classList.remove('active');
        }

        if (messagesDropdown && !messagesDropdown.contains(event.target)) {
            messagesDropdown.classList.remove('active');
        }
    });
</script>
